<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>National Girlfriend Day!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="top-bar">
        <h3>Happy National Girlfriend Day! 💜</h3>
        <div id="controls">
            <button id="btnPause" title="Pause">
                <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
                <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
            </button>
            <button id="btnPhotos" title="Toggle Photos">
                <svg id="iconPhotoOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21,15 16,10 5,21" />
                </svg>
                <svg id="iconPhotoOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <line x1="2" y1="2" x2="22" y2="22" />
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21,15 16,10 5,21" />
                </svg>
            </button>
        </div>
    </header>

    <footer>
        <a href="../index.html">← Go back to selection</a>
    </footer>
    <div id="scene"></div>
    <script src="main.js"></script>
</body>

</html>
